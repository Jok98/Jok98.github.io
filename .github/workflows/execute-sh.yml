name: Update content indexes

on:
  push:
    branches:
      - main

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Backup Current JSON indexes
        run: |
          cp assets/data/directories.json assets/data/directories.json.bak || echo "No previous directories.json to backup"
          cp assets/data/content-index.json assets/data/content-index.json.bak || echo "No previous content-index.json to backup"

      - name: List Notes Directory
        run: |
          echo "Contents of notes directory:"
          ls -R notes || echo "Notes directory not found"

      - name: Run JSON Generator Scripts
        run: |
          chmod +x scripts/create_json.sh
          chmod +x scripts/create_content_index.py
          ./scripts/create_json.sh
          python3 scripts/create_content_index.py
          echo "Generated directories.json content:"
          cat assets/data/directories.json
          echo "Generated content-index.json content:"
          cat assets/data/content-index.json

      - name: Compare JSON Files
        run: |
          if diff assets/data/directories.json assets/data/directories.json.bak; then
            echo "No changes in directories.json"
          else
            echo "directories.json has changed:"
            diff assets/data/directories.json assets/data/directories.json.bak || true
          fi
          if diff assets/data/content-index.json assets/data/content-index.json.bak; then
            echo "No changes in content-index.json"
          else
            echo "content-index.json has changed:"
            diff assets/data/content-index.json assets/data/content-index.json.bak || true
          fi

      - name: Debug Git
        run: |
          git status
          git diff assets/data/directories.json assets/data/content-index.json

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add assets/data/directories.json assets/data/content-index.json
          git commit -m "Update content indexes [CI]" || echo "No changes to commit"
          git push origin main || echo "Push failed"
